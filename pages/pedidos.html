<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustPay — Historial de Pedidos</title>

<!-- Tipografías -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS: variables y base compartida primero, luego el de esta pantalla -->
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/toast.css">
<link rel="stylesheet" href="../css/pedidos.css">
</head>
<body>

<div id="app">

  <section class="screen" id="screen-pedidos">

    <!-- Topbar Azul -->
    <header class="topbar topbar-azul">
      <button class="btn-back" id="btn-back-pedidos" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <h1>Mis Pedidos</h1>
    </header>

    <div class="cuerpo-pedidos">
      
      <!-- Selector de pestañas -->
      <div class="tabs-pedidos">
        <button class="tab-btn activo" data-tab="activos">En proceso</button>
        <button class="tab-btn" data-tab="historial">Historial</button>
      </div>

      <!-- Contenedor de lista -->
      <div id="pedidos-container" class="pedidos-list">
        <!-- Renderizado dinámico -->
      </div>

    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
      <button class="nav-item" data-nav="inicio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>
        <span>Inicio</span>
      </button>
      <button class="nav-item activo" data-nav="pedidos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/><path d="M3 3h2l1 3"/></svg>
        <span>Pedidos</span>
      </button>
      <button class="nav-item" data-nav="tracking">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s7-6.1 7-12a7 7 0 10-14 0c0 5.9 7 12 7 12z"/><circle cx="12" cy="10" r="2.4"/></svg>
        <span>Tracking</span>
      </button>
      <button class="nav-item" data-nav="perfil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
        <span>Perfil</span>
      </button>
    </nav>

  </section>

</div>

<!-- JS -->
<script src="../js/storage.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/router.js"></script>
<script src="../js/pedidos.js"></script>
</body>
</html>
