<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustPay — Detalle de Producto</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/variables.css?v=10">
<link rel="stylesheet" href="../css/base.css?v=10">
<link rel="stylesheet" href="../css/toast.css?v=10">
<link rel="stylesheet" href="../css/seleccion.css?v=10"> <!-- Para UI de carrito y bottom nav -->
<link rel="stylesheet" href="../css/producto.css?v=11">
</head>
<body>

<div id="app">
  <section class="screen activa" id="screen-producto">
    
    <!-- Header -->
    <header class="topbar topbar-azul">
      <button class="btn-back" id="btn-back" aria-label="Volver">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <h1>Detalle del Producto</h1>
      <button id="btn-header-cart" class="btn-header-cart" aria-label="Ver Carrito">
        <span class="cart-icon">🛒</span>
        <span class="cart-text">Mi carrito</span>
        <span id="cart-badge-text">0</span>
      </button>
    </header>

    <div class="cuerpo-producto">
      
      <!-- Layout Marketplace -->
      <div class="producto-layout">
        <!-- Imagen Izquierda -->
        <div class="producto-img-container">
          <div id="producto-img-placeholder" class="img-placeholder">🛒</div>
          <img id="producto-img" src="" style="display: none;" alt="Producto">
        </div>

        <!-- Info Derecha -->
        <div class="producto-info-container">
          <div class="producto-estado-vendidos">
            <span id="prod-estado" class="tag-estado">Nuevo</span>
            <span id="prod-ventas" class="tag-ventas">| +100 vendidos</span>
          </div>

          <h2 id="prod-nombre">Nombre del Producto</h2>
          
          <div class="prod-precio-box">
            <p id="prod-precio" class="precio-principal">S/. 0.00</p>
          </div>

          <p id="prod-desc" class="prod-descripcion">Descripción completa del producto.</p>

          <!-- Detalles Extra -->
          <div class="prod-atributos">
            <div class="attr-row">
              <span class="attr-label">Stock disponible:</span>
              <span id="prod-stock" class="attr-value">10 unidades</span>
            </div>
            <div class="attr-row">
              <span class="attr-label">Categoría:</span>
              <span id="prod-categoria" class="attr-value">General</span>
            </div>
            <div class="attr-row">
              <span class="attr-label">Disponibilidad:</span>
              <span id="prod-disponibilidad" class="attr-value verde">Disponible</span>
            </div>
            <div class="attr-row">
              <span class="attr-label">Tiempo entrega:</span>
              <span id="prod-entrega" class="attr-value">15 - 30 min</span>
            </div>
          </div>

          <!-- Info Vendedor -->
          <div class="vendedor-box">
            <div class="vendedor-header">
              <div class="vendedor-logo" id="vendedor-logo">V</div>
              <div class="vendedor-textos">
                <span class="vendedor-title">Vendido por:</span>
                <span id="vendedor-nombre" class="vendedor-nombre">Negocio</span>
                <div class="vendedor-meta">
                  <span id="vendedor-calif">⭐ 4.8</span>
                  <span id="vendedor-estado" class="verde">Abierto</span>
                </div>
              </div>
              <span class="sello-verificado" title="Vendedor Verificado">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </span>
            </div>
          </div>

          <!-- Acciones -->
          <div class="producto-acciones">
            <button id="btn-add-cart" class="btn-secundario btn-lg">Agregar al carrito</button>
            <button id="btn-comprar-ahora" class="btn-primario btn-lg">Comprar ahora</button>
          </div>

        </div>
      </div>
    </div>

    <!-- Modal Carrito -->
    <div id="cart-modal" class="modal-overlay">
      <div class="modal-content cart-modal-content">
        <div class="cart-header">
          <h2>Mi Carrito</h2>
          <button class="modal-close" id="btn-close-cart" aria-label="Cerrar">&times;</button>
        </div>
        
        <div id="cart-items-container" class="cart-items"></div>

        <div class="cart-footer">
          <div class="cart-total-row">
            <span>Subtotal</span>
            <span id="cart-subtotal">S/. 0.00</span>
          </div>
          <button id="btn-checkout-cart" class="btn-primario" disabled>Proceder al Pago</button>
        </div>
      </div>
    </div>

  </section>
</div>

<script src="../js/data.js?v=18"></script>
<script src="../js/storage.js?v=10"></script>
<script src="../js/toast.js?v=10"></script>
<script src="../js/producto.js?v=15"></script>
</body>
</html>
